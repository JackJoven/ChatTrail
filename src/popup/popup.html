<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="./popup.css">
    <title>ChatTrail</title>
  </head>
  <body>
    <main>
      <h1>ChatTrail</h1>
      <p>已启用 ChatGPT 和豆包增强能力。</p>
      <ul>
        <li>时间轴：只显示你的提问</li>
        <li>导出：Markdown / JSON</li>
        <li>提示词库、引用回复、公式复制</li>
        <li><kbd>j</kbd>/<kbd>k</kbd>：下一条/上一条提问</li>
      </ul>
      <div class="actions">
        <button data-action="prompts" type="button">提示词库</button>
        <button data-action="export-md" type="button">导出 Markdown</button>
        <button data-action="export-json" type="button">导出 JSON</button>
        <button data-action="copy-debug" type="button">复制诊断信息</button>
      </div>
      <button id="open-options" type="button">打开设置</button>
      <p id="status" class="status" role="status"></p>
    </main>
    <script src="./popup.js"></script>
  </body>
</html>
